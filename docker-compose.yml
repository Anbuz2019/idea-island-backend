version: "3.9"

services:

  mysql:
    image: mysql:8.0.36
    container_name: idea-island-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docs/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./docs/sql/tables_xxl_job.sql:/docker-entrypoint-initdb.d/02-xxl-job.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: idea-island-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.1
    container_name: idea-island-xxl-job
    restart: unless-stopped
    environment:
      PARAMS: >
        --spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=${DB_USERNAME}
        --spring.datasource.password=${DB_PASSWORD}
        --xxl.job.accessToken=${XXL_JOB_ACCESS_TOKEN}
    ports:
      - "9090:8080"
    depends_on:
      mysql:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - idea-island:1.0
    container_name: idea-island-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      XXL_JOB_ADMIN_URL: http://xxl-job-admin:8080/xxl-job-admin
    ports:
      - "8091:8091"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
      - app_data_logs:/app/data/log
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8091/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  mysql_data:
  redis_data:
  app_logs:
  app_data_logs:
