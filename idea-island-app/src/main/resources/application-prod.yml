server:
  port: 8091

spring:
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf8&autoReconnect=true&zeroDateTimeBehavior=convertToNull&serverTimezone=UTC&useSSL=true&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: IdeaIslandHikari
      minimum-idle: 10
      maximum-pool-size: 30
      idle-timeout: 30000
      connection-timeout: 10000
      max-lifetime: 1800000

mybatis:
  mapper-locations: classpath:/mybatis/mapper/*.xml
#  config-location: classpath:/mybatis/config/mybatis-config.xml
  configuration:
    map-underscore-to-camel-case: true

redis:
  sdk:
    config:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      pool-size: 20
      min-idle-size: 10
      idle-timeout: 30000
      connect-timeout: 5000
      retry-attempts: 3
      retry-interval: 1000
      ping-interval: 60000
      keep-alive: true

jwt:
  secret: ${JWT_SECRET}
  expire-days: 7

auth:
  phone-code:
    ttl-minutes: 5
    expose-code: false

knife4j:
  enable: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

xxl:
  job:
    accessToken: ${XXL_JOB_ACCESS_TOKEN}
    admin:
      addresses: ${XXL_JOB_ADMIN_URL}
    executor:
      appname: idea-island-executor
      address:
      ip:
      port: 9999
      logpath: /app/logs/xxl-job
      logretentiondays: 30

cos:
  secret-id: ${COS_SECRET_ID}
  secret-key: ${COS_SECRET_KEY}
  bucket: ${COS_BUCKET}
  region: ${COS_REGION}
  base-url: ${COS_BASE_URL:}

logging:
  level:
    root: info
  config: classpath:logback-spring.xml

management:
  health:
    discovery:
      enabled: false
  endpoints:
    web:
      exposure:
        include: refresh,health,info
      base-path: /actuator
