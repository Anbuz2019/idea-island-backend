server:
  port: 8091

# 线程池配置（可通过 Nacos 热更新）
thread:
  pool:
    executor:
      config:
        core-pool-size: 20
        max-pool-size: 50
        keep-alive-time: 5000
        block-queue-size: 5000
        policy: CallerRunsPolicy

spring:
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: ${REDIS_PASSWORD:}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/${DB_NAME:idea_island}?useUnicode=true&characterEncoding=utf8&autoReconnect=true&zeroDateTimeBehavior=convertToNull&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    hikari:
      pool-name: IdeaIslandHikari
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 10000
      max-lifetime: 1800000

mybatis:
  mapper-locations: classpath:/mybatis/mapper/*.xml
#  config-location: classpath:/mybatis/config/mybatis-config.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# Redis（Redisson）
redis:
  sdk:
    config:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      pool-size: 10
      min-idle-size: 5
      idle-timeout: 30000
      connect-timeout: 5000
      retry-attempts: 3
      retry-interval: 1000
      ping-interval: 60000
      keep-alive: true

# JWT 配置
jwt:
  secret: ${JWT_SECRET:}
  expire-days: 7

auth:
  phone-code:
    ttl-minutes: 5
    expose-code: true

knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# RocketMQ
rocketmq:
  name-server: 127.0.0.1:9876
  consumer:
    group: idea-island-group
    pull-batch-size: 10
  producer:
    group: idea-island-group
    send-message-timeout: 10000
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2

# XXL-Job
xxl:
  job:
    accessToken: fXWGPYzLTB7uarFT0ZkJTd6i4jNd1DuQK2F9caNHnHU=
    admin:
      addresses: http://127.0.0.1:9090/xxl-job-admin
    executor:
      appname: idea-island-executor
      address:
      ip:
      port: 9999
      logpath: ./data/applogs/xxl-job/jobhandler
      logretentiondays: 30

# 腾讯云 COS
cos:
  secret-id: ${COS_SECRET_ID:}
  secret-key: ${COS_SECRET_KEY:}
  bucket: ${COS_BUCKET:}
  region: ${COS_REGION:}
  base-url: ${COS_BASE_URL:}

# 日志
logging:
  level:
    root: info
    com.anbuz: debug
  config: classpath:logback-spring.xml
